<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DancePlugin-Mineradio Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        background: #050608;
        color: #e8ecef;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: grid;
        grid-template-rows: 1fr auto;
        background: #000;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .hud {
        position: fixed;
        left: 18px;
        bottom: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.58);
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        backdrop-filter: blur(16px);
      }

      .hud strong {
        color: #fff;
        font-weight: 760;
      }

      .hud button {
        height: 28px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div class="hud">
      <strong>mineradio</strong>
      <span>drag to orbit, double click to reset</span>
      <button id="toggle" type="button">pause</button>
    </div>
    <script type="module">
      import MineradioPlugin from '../dist/index.js';

      const canvas = document.getElementById('stage');
      const toggle = document.getElementById('toggle');
      const plugin = new MineradioPlugin();
      const frequencyData = new Uint8Array(128);
      const timeDomainData = new Uint8Array(128);
      let playing = true;
      let last = performance.now();
      let currentTime = 0;

      const lyrics = [
        { time: 0, text: '载我们去下一段旅程' },
        { time: 5, text: '在黑夜里让光跟着节奏醒来' },
        { time: 10, text: '悬浮的歌词穿过粒子封面' },
        { time: 15, text: '再把视角拉回舞台中央' },
      ];

      function resize() {
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        const width = Math.floor(window.innerWidth * ratio);
        const height = Math.floor(window.innerHeight * ratio);
        canvas.width = width;
        canvas.height = height;
        plugin.resize?.(width, height);
      }

      function makeAudioFrame(now) {
        const t = now / 1000;
        const kick = Math.max(0, Math.sin(t * Math.PI * 2 * 1.85));
        const pulse = Math.pow(kick, 4);
        const climax = (Math.sin(t * 0.32) + 1) * 0.5;
        for (let i = 0; i < frequencyData.length; i += 1) {
          const band = i / frequencyData.length;
          frequencyData[i] = Math.round(24 + pulse * 190 * (1 - band * 0.42) + Math.random() * 18);
          timeDomainData[i] = Math.round(128 + Math.sin(t * 4 + i * 0.14) * 42);
        }
        return {
          frequencyData,
          timeDomainData,
          bassLevel: Math.min(1, 0.22 + pulse * 0.72),
          midLevel: 0.32 + climax * 0.34,
          trebleLevel: 0.24 + pulse * 0.28,
          volume: 0.42 + pulse * 0.34,
          energy: 0.36 + pulse * 0.42,
          beatDetected: pulse > 0.84,
          bpm: 111,
          bassChange: pulse * 0.8,
          volumeChange: pulse * 0.6,
          rhythm: {
            bands: {
              sub: pulse,
              kick: pulse,
              low: 0.26 + pulse * 0.7,
              body: 0.34 + climax * 0.34,
              vocal: 0.42,
              snap: pulse * 0.72,
              mid: 0.36 + climax * 0.3,
              treble: 0.28 + pulse * 0.3,
              volume: 0.42 + pulse * 0.34,
              energy: 0.36 + pulse * 0.42,
            },
            onset: { bass: pulse, energy: pulse * 0.86, score: pulse },
            section: {
              energy: 0.44 + climax * 0.46,
              low: 0.34 + pulse * 0.42,
              lift: climax,
              dynamics: 0.72 + climax * 0.36,
              density: 0.46 + pulse * 0.32,
              climax,
              bloom: Math.max(climax * 0.72, pulse * 0.45),
            },
            beat: {
              hit: pulse > 0.84,
              time: currentTime,
              strength: pulse,
              confidence: 0.86,
              score: pulse,
              low: pulse,
              body: 0.38 + climax * 0.22,
              vocal: 0.42,
              snap: pulse * 0.7,
              mass: 0.45 + pulse * 0.42,
              sharpness: pulse,
              tempoAssist: true,
              tempoGap: 0.54,
              tempoConfidence: 0.82,
              combo: pulse > 0.9 ? 'downbeat' : 'none',
              source: 'realtime',
            },
            pulse,
            bass: 0.22 + pulse * 0.72,
            mid: 0.32 + climax * 0.34,
            treble: 0.24 + pulse * 0.28,
            energy: 0.36 + pulse * 0.42,
          },
        };
      }

      function frame(now) {
        const dt = Math.min(0.05, Math.max(0, (now - last) / 1000));
        last = now;
        if (playing) currentTime += dt;
        plugin.updateSettings?.({
          currentTime,
          currentSong: {
            title: 'Demo Stage',
            artist: 'DancingMusic',
            lyrics,
          },
          playlist: [
            { title: 'Demo Stage', artist: 'DancingMusic', queueIndex: 0 },
            { title: 'Particle Cover', artist: 'Mineradio', queueIndex: 1 },
            { title: 'Floating Lyric', artist: 'Mineradio', queueIndex: 2 },
          ],
          playlistCollections: [
            { id: 'demo-liked', title: '我喜欢', subtitle: 'Demo playlist', trackCount: 3 },
            { id: 'demo-stage', title: '舞台样例', subtitle: 'Local preview', trackCount: 4 },
          ],
          hostActions: {
            playQueueIndex(index) {
              console.info('[demo] playQueueIndex', index);
            },
            playPlaylist(request) {
              console.info('[demo] playPlaylist', request);
            },
            openPlaylistDetail(request) {
              console.info('[demo] openPlaylistDetail', request);
            },
          },
        });
        plugin.render(makeAudioFrame(now), dt, playing);
        requestAnimationFrame(frame);
      }

      toggle.addEventListener('click', () => {
        playing = !playing;
        toggle.textContent = playing ? 'pause' : 'play';
      });

      plugin.init(canvas);
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(frame);
    </script>
  </body>
</html>

name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - docs/**
      - tsconfig.json
      - tsup.config.ts
      - vitest.config.ts
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Prepare local SDK dependency
        run: |
          mkdir -p ../DancingMusic/submodules
          git clone --depth 1 https://github.com/DancingMusic/DancingPluginSdk.git ../DancingMusic/submodules/DancingPluginSdk
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish version tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"
          gh release create "${TAG}" --title "${TAG}" --notes "DancePlugin-Mineradio ${TAG}"
        env:
          GH_TOKEN: ${{ github.token }}
